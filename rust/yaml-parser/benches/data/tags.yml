# Benchmark file for tag performance
# Tests various tag formats

# Explicit typing
integers:
  decimal: !!int 42
  octal: !!int 0o52
  hex: !!int 0x2A
  binary: !!int 0b101010

floats:
  simple: !!float 3.14159
  scientific: !!float 6.022e23
  negative: !!float -273.15
  infinity: !!float .inf
  nan: !!float .nan

strings:
  plain: !!str hello world
  quoted: !!str "with quotes"
  number_as_string: !!str "42"
  bool_as_string: !!str "true"

booleans:
  yes: !!bool true
  no: !!bool false
  enabled: !!bool TRUE
  disabled: !!bool FALSE

nulls:
  empty: !!null
  tilde: !!null ~
  explicit: !!null null

# Sequences with tags
tagged_sequence: !!seq
  - first
  - second
  - third

# Mappings with tags
tagged_mapping: !!map
  key1: value1
  key2: value2
  key3: value3

# Custom/local tags
custom_types:
  timestamp: !timestamp 2024-01-15T10:30:00Z
  binary: !binary |
    R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7
  python_tuple: !python/tuple [1, 2, 3]
  custom_object: !custom
    field1: value1
    field2: value2

# Mixed content with tags
configuration:
  version: !!str "2.0"
  port: !!int 8080
  debug: !!bool true
  timeout: !!float 30.5

  database:
    host: !!str localhost
    port: !!int 5432
    pool_size: !!int 10
    ssl: !!bool false

  features: !!seq
    - !!str caching
    - !!str compression
    - !!str logging

  metadata: !!map
    created: !timestamp 2024-01-01T00:00:00Z
    updated: !timestamp 2024-06-15T12:00:00Z
    owner: !!str admin

# Verbatim tags
verbatim:
  local: !<!local> value
  global: !<tag:yaml.org,2002:str> "explicit global"

# Tag shorthand
shorthand:
  string: !str text
  integer: !int 100
  float: !float 1.5
  bool: !bool yes
  null: !null ~

# Repeated tags (stress test)
many_tagged_items:
  - !!str item1
  - !!str item2
  - !!str item3
  - !!int 1
  - !!int 2
  - !!int 3
  - !!float 1.1
  - !!float 2.2
  - !!float 3.3
  - !!bool true
  - !!bool false
  - !!bool true
