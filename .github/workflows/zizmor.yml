---
name: zizmor

"on":
  pull_request:
    paths:
      - ".github/**"
  push:
    branches:
      - main
    paths:
      - ".github/**"

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install zizmor
        run: cargo install zizmor --version 1.25.2 --locked

      - name: Run zizmor
        run: zizmor .github
